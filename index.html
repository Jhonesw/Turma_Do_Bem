<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta property="og:title" content="Cadastro Comunitário">
    <meta property="og:description" content="Faça aqui o cadastro da criança para os projetos da comunidade.">
    <meta property="og:image" content="https://jhonesw.github.io/Turma_Do_Bem/logo.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jhonesw.github.io/Turma_Do_Bem/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro da Comunidade</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #25d366; text-align: center; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #25d366; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; font-weight: bold; }
        button:hover { background-color: #128c7e; }
        
        #success-screen { display: none; text-align: center; }
        .neighborhood-box { border: 2px solid #25d366; padding: 15px; border-radius: 8px; margin-top: 20px; background-color: #e8fceb; }
        #group-link { display: none; margin-top: 15px; background-color: #007bff; }
    </style>
</head>
<body>

<div class="container">
    <img style="width: 70%; display: flex; margin: auto;" src="./logo.png" alt="" srcset="">
    <div id="form-screen">
        <h2>Cadastro Comunitário</h2>
        <form id="registrationForm">
            <label>Nome da Mãe</label>
            <input type="text" id="nomeMae" required>

            <label>Nome da Criança</label>
            <input type="text" id="nomeCrianca" required>

            <label>Celular da Mãe</label>
            <input type="tel" id="celularMae" placeholder="(00) 00000-0000" required>

            <label>Nome da Líder</label>
            <input type="text" id="nomeLider" required>

            <label>Comunidade</label>
            <input type="text" id="bairroForm" required>

            <p style="text-align: center;">APÓS ENVIAR O CADASTRO VOLTE AQUI!</p>
            <button type="button" onclick="enviarWhatsApp()">Enviar para WhatsApp</button>
        </form>
    </div>

    <div id="success-screen">
        <h2 style="color: #128c7e;">✅ Cadastrado com Sucesso!</h2>
        <p>Seus dados foram enviados. Agora, selecione seu bairro abaixo para entrar no grupo de avisos:</p>
        
        <div class="neighborhood-box">
            <label>Selecione Sua Comunidade:</label>
            <select id="bairroSelector" onchange="mostrarLinkGrupo()">
                <option value="">-- Escolha um bairro --</option>
                <option value="link1">Sapé de Baixo</option>
                <option value="link2">Sapé de Cima e Posto</option>
                <option value="link3">Mandioquinha</option> 
                <option value="link4">Jd Boa vista</option>   
                <option value="link5">Jd Jaqueline</option>
                <option value="link6">Jd João XIII / Apoador</option>
                <option value="link7">Jd Guaraú</option>
                <option value="link8">Rua 8</option>
                <option value="link9">Jd Esther</option>
                <option value="link10">Sem Terra</option> 
                <option value="link11">Gelo</option>
                <option value="link12">Piamonteses</option>
                <option value="link13">Cohab Raposo</option>
                <option value="link14">Ponta Da Praia</option>
                <option value="link15">Predinhos</option>
                <option value="link16">Jd São Domingos</option>
            </select>

            <a id="group-link" href="#" target="_blank">
                <button style="background-color: #007bff;">Entrar no Grupo do Bairro</button>
            </a>
        </div>
    </div>
</div>

<script>
    function enviarWhatsApp() {
        // Coleta apenas os campos que existem no seu formulário atual
        const dados = {
            mae: document.getElementById('nomeMae').value,
            crianca: document.getElementById('nomeCrianca').value,
            celular: document.getElementById('celularMae').value,
            lider: document.getElementById('nomeLider').value,
            comunidade: document.getElementById('bairroForm').value
        };

        // Validação simples de preenchimento
        if (!dados.mae || !dados.crianca || !dados.celular || !dados.lider || !dados.comunidade) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        const numeroDestino = "5511940348016"; 
        const mensagem = `*Novo Cadastro de Comunidade*%n%n` +
            `*Nome da Mãe:* ${dados.mae}%n` +
            `*Nome da Criança:* ${dados.crianca}%n` +
            `*Celular da Mãe:* ${dados.celular}%n` +
            `*Nome da Líder:* ${dados.lider}%n` +
            `*Comunidade:* ${dados.comunidade}`;

        const url = `https://api.whatsapp.com/send?phone=${numeroDestino}&text=${mensagem.replace(/%n/g, '%0A')}`;

        window.open(url, '_blank');
        
        // Troca de tela
        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
    }

    function mostrarLinkGrupo() {
        const select = document.getElementById('bairroSelector');
        const linkBtn = document.getElementById('group-link');
        const links = {
            "link1": "https://chat.whatsapp.com/L1CTqTmkbTP9zcOblrHnsK?mode=gi_t",
            "link2": "https://chat.whatsapp.com/KD0ed31vOgsKhiOHpK3C2v?mode=gi_t",
            "link3": "https://chat.whatsapp.com/G8oaXNzfjnt75dKjU5xuu4?mode=gi_t",
            "link4": "https://chat.whatsapp.com/Kx0qTOd53R71ejZkuHJ76a?mode=gi_t", 
            "link5": "https://chat.whatsapp.com/BTo1YTKykbVEm49vNvAujX?mode=gi_t", 
            "link6": "https://chat.whatsapp.com/H9W68tyfgLd50WdrLD6hzl?mode=gi_t", 
            "link7": "https://chat.whatsapp.com/GWKISYttbXE4b6HMBAcuUG?mode=gi_t", 
            "link8": "https://chat.whatsapp.com/GWqZCZLs4yS99yVosijJzq?mode=gi_t", 
            "link9": "https://chat.whatsapp.com/EbvJ19E7bPJ4TqEcLGqizM?mode=gi_t", 
            "link10": "https://chat.whatsapp.com/HmASaxUGRDZCUY39YLKRlG?mode=gi_t",
            "link11": "https://chat.whatsapp.com/HWltI07ZT5wJbfJaG4m6Xn?mode=gi_t",
            "link12": "https://chat.whatsapp.com/IFTgd739XnfA1xXlxObN6e?mode=gi_t",
            "link13": "https://chat.whatsapp.com/KcFdzw6o95y31640lkjIhQ?mode=gi_t",
            "link14": "https://chat.whatsapp.com/CNu1hDkOWsEDY6LKbdalZd?mode=gi_t",
            "link15": "https://chat.whatsapp.com/FLybyxVnTN29CVUwr1RZEY?mode=gi_t",
            "link16": "https://chat.whatsapp.com/FmgU0IU5xhRAZKzSufj9cS?mode=gi_t"
        };

        if (select.value !== "") {
            linkBtn.href = links[select.value];
            linkBtn.style.display = 'block';
        } else {
            linkBtn.style.display = 'none';
        }
    }
</script>

</body>
</html>
